name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: PyTherm-Windows.exe
            dist_path: dist/PyTherm.exe
          - os: macos-latest
            artifact: PyTherm-macOS
            dist_path: dist/PyTherm
          - os: ubuntu-latest
            artifact: PyTherm-Linux
            dist_path: dist/PyTherm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller pytherm.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist_path }}

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.dist_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
